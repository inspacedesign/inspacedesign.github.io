<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加入 LINE 好友｜入空間設計 IN.SPACE</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <link rel="icon" type="image/png" href="/favicon-32.png?v=2">
  <meta name="description" content="掃描 QR Code 加入入空間設計 IN.SPACE 官方 LINE。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      font-weight: 300;
      color: #1A1A1A;
      background: #FFFFFF;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 32px; }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      z-index: 100; padding: 18px 0;
    }
    nav .container { display: flex; justify-content: space-between; align-items: center; }
    .brand {
      font-family: "Noto Serif TC", serif;
      font-size: 20px; font-weight: 600; letter-spacing: 2px;
      color: #1A1A1A; text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 28px; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      color: #666666; text-decoration: none;
      font-size: 14px; letter-spacing: 1px;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active { color: #1A1A1A; }
    .lang-toggle {
      display: flex; align-items: center; gap: 6px;
      padding-left: 20px; border-left: 1px solid #DDDDDD;
    }
    .lang-btn {
      background: none; border: none; color: #999999;
      font-size: 13px; letter-spacing: 1px;
      cursor: pointer; padding: 4px 2px;
      font-family: inherit; transition: color 0.25s;
    }
    .lang-btn:hover { color: #1A1A1A; }
    .lang-btn.active { color: #1A1A1A; font-weight: 500; }
    .lang-toggle .sep { color: #CCCCCC; font-size: 12px; }

    .line-page {
      min-height: calc(100vh - 64px - 92px); /* 扣 nav 跟 footer */
      padding: 140px 0 80px;
      text-align: center;
      background: #FAFAFA;
    }
    .line-icon-large {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #06C755;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 6px 18px rgba(6, 199, 85, 0.3);
    }
    .line-icon-large svg {
      width: 36px; height: 36px;
      fill: #FFFFFF;
    }
    .line-page h1 {
      font-family: "Noto Serif TC", serif;
      font-size: clamp(28px, 3.5vw, 40px);
      font-weight: 600;
      letter-spacing: 3px;
      margin-bottom: 16px;
      color: #1A1A1A;
    }
    .line-page .lead {
      font-size: 15px;
      color: #666666;
      max-width: 480px;
      margin: 0 auto 56px;
      line-height: 1.9;
    }
    .qr-wrap {
      display: inline-block;
      padding: 24px;
      background: #FFFFFF;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }
    .qr-wrap img {
      display: block;
      width: 280px;
      height: 280px;
      max-width: 80vw;
      max-height: 80vw;
    }
    .qr-hint {
      margin-top: 32px;
      font-size: 13px;
      color: #999999;
      letter-spacing: 2px;
    }
    .back-link {
      display: inline-block;
      margin-top: 48px;
      font-size: 13px;
      letter-spacing: 2px;
      color: #666666;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.25s, color 0.25s;
    }
    .back-link:hover { color: #1A1A1A; border-color: #1A1A1A; }

    footer {
      background: #F7F7F7;
      color: #666666;
      padding: 36px 0;
      text-align: center;
      font-size: 13px;
      letter-spacing: 1px;
      border-top: 1px solid #E5E5E5;
    }

    @media (max-width: 768px) {
      .nav-right { gap: 14px; }
      .nav-links { gap: 16px; }
      .nav-links a { font-size: 12px; }
      .lang-toggle { padding-left: 12px; gap: 4px; }
      .container { padding: 0 20px; }
      .line-page { padding: 110px 0 60px; }
      .qr-wrap { padding: 16px; }
      .qr-wrap img { width: 240px; height: 240px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="index.html" class="brand">IN.SPACE</a>
      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="about.html" data-zh="關於" data-en="About">關於</a></li>
          <li><a href="works.html" data-zh="作品" data-en="Works">作品</a></li>
          <li><a href="process.html" data-zh="流程" data-en="Process">流程</a></li>
          <li><a href="pricing.html" data-zh="收費" data-en="Pricing">收費</a></li>
          <li><a href="index.html#contact" data-zh="聯絡" data-en="Contact">聯絡</a></li>
        </ul>
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="zh">中</button>
          <span class="sep">／</span>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </nav>

  <section class="line-page">
    <div class="container">
      <div class="line-icon-large">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16 3C8.27 3 2 7.96 2 14.08c0 5.48 4.96 10.08 11.7 11.04.45.1 1.07.3 1.23.69.14.35.09.9.04 1.27 0 0-.16.99-.2 1.2-.06.35-.28 1.38 1.21.75 1.49-.63 8.04-4.73 10.97-8.1 2.02-2.22 2.99-4.46 2.99-6.85C30 7.96 23.73 3 16 3zM10.06 17.4H7.7c-.34 0-.62-.28-.62-.62v-4.74c0-.34.28-.62.62-.62.34 0 .62.28.62.62v4.12h1.74c.34 0 .62.28.62.62s-.28.62-.62.62zm2.4-.62c0 .34-.28.62-.62.62s-.62-.28-.62-.62v-4.74c0-.34.28-.62.62-.62s.62.28.62.62v4.74zm5.69 0c0 .27-.17.51-.43.59-.06.02-.13.03-.2.03-.2 0-.38-.09-.5-.25l-2.42-3.3v2.93c0 .34-.28.62-.62.62s-.62-.28-.62-.62v-4.74c0-.27.17-.5.43-.59.06-.02.13-.03.2-.03.2 0 .38.09.5.25l2.42 3.3v-2.93c0-.34.28-.62.62-.62s.62.28.62.62v4.74zm3.8-2.99c.34 0 .62.28.62.62s-.28.62-.62.62h-1.74v1.13h1.74c.34 0 .62.28.62.62s-.28.62-.62.62H19.6c-.34 0-.62-.28-.62-.62v-4.74c0-.34.28-.62.62-.62h2.36c.34 0 .62.28.62.62s-.28.62-.62.62H20.2v1.13h1.75z"/>
        </svg>
      </div>
      <h1 data-zh="加入 LINE 好友" data-en="Add Us on LINE">加入 LINE 好友</h1>
      <p class="lead"
         data-zh="掃描下方 QR Code，加入入空間設計官方 LINE，<br>諮詢、預約、追蹤進度，都從這裡開始。"
         data-en="Scan the QR code below to add IN.SPACE on LINE —<br>consultations, bookings, and project updates all start here.">
        掃描下方 QR Code，加入入空間設計官方 LINE，<br>諮詢、預約、追蹤進度，都從這裡開始。
      </p>
      <div class="qr-wrap">
        <img src="line-qr.jpg" alt="LINE QR Code">
      </div>
      <p class="qr-hint" data-zh="手機可以長按 QR Code 開啟 LINE" data-en="On mobile, long-press the QR code to open LINE">
        手機可以長按 QR Code 開啟 LINE
      </p>
      <br>
      <a href="index.html" class="back-link" data-zh="← 回首頁" data-en="← Back to home">← 回首頁</a>
    </div>
  </section>

  <footer>
    <div class="container">
      © 2020 INSPACE DESIGN LTD. All rights reserved.
    </div>
  </footer>

  <script>
  (function() {
    function setLang(lang) {
      document.documentElement.setAttribute('lang', lang === 'en' ? 'en' : 'zh-Hant');
      document.querySelectorAll('[data-zh][data-en]').forEach(function(el) {
        var t = el.getAttribute('data-' + lang);
        if (t !== null) el.innerHTML = t;
      });
      document.querySelectorAll('.lang-btn').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
      try { localStorage.setItem('inspace-lang', lang); } catch(e) {}
    }
    document.querySelectorAll('.lang-btn').forEach(function(b) {
      b.addEventListener('click', function() {
        setLang(b.getAttribute('data-lang'));
      });
    });
    try {
      var saved = localStorage.getItem('inspace-lang');
      if (saved === 'en') setLang('en');
    } catch(e) {}
  })();
  </script>

</body>
</html>
